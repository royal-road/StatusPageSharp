services:
  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-statuspage}
      POSTGRES_USER: ${POSTGRES_USER:-statuspage}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-statuspage}
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"
        ]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 5s
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    restart: unless-stopped
    volumes:
      - postgres-data:/var/lib/postgresql

  web:
    image: ${STATUSPAGE_WEB_IMAGE:-ghcr.io/royal-road/statuspagesharp-web:main}
    pull_policy: always
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_HTTP_PORTS: "8080"
      BootstrapAdmin__DisplayName: ${STATUSPAGE_BOOTSTRAP_ADMIN_DISPLAY_NAME:-Admin}
      BootstrapAdmin__Email: ${STATUSPAGE_BOOTSTRAP_ADMIN_EMAIL:-admin@localhost}
      BootstrapAdmin__Enabled: ${STATUSPAGE_BOOTSTRAP_ADMIN_ENABLED:-true}
      BootstrapAdmin__Password: ${STATUSPAGE_BOOTSTRAP_ADMIN_PASSWORD:-ChangeThis123!}
      ConnectionStrings__DefaultConnection: Host=postgres;Port=5432;Database=${POSTGRES_DB:-statuspage};Username=${POSTGRES_USER:-statuspage};Password=${POSTGRES_PASSWORD:-statuspage}
    ports:
      - "${STATUSPAGE_WEB_PORT:-5008}:8080"
    restart: unless-stopped
    volumes:
      - web-data-protection:/root/.aspnet/DataProtection-Keys

  worker:
    image: ${STATUSPAGE_WORKER_IMAGE:-ghcr.io/royal-road/statuspagesharp-worker:main}
    pull_policy: always
    depends_on:
      postgres:
        condition: service_healthy
      web:
        condition: service_started
    environment:
      ConnectionStrings__DefaultConnection: Host=postgres;Port=5432;Database=${POSTGRES_DB:-statuspage};Username=${POSTGRES_USER:-statuspage};Password=${POSTGRES_PASSWORD:-statuspage}
    cap_add:
      - NET_RAW
    restart: unless-stopped

volumes:
  postgres-data:
    name: statuspagesharp-postgres-data
  web-data-protection:
    name: statuspagesharp-web-data-protection
